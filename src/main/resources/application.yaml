spring:
  application:
    name: license-portal

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/license_portal
    username: root
    password: admin

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

  flyway:
    enabled: true

server:
  port: 0